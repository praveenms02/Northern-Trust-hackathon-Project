<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PayFlow — Payment Gateway</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>
</head>
<body>

<!-- PART 1: Login page + Dashboard shell -->
<!-- PART 2: Send Money tab + Payment modal -->
<!-- PART 3: History tab + Status Checker tab -->

<!-- ══════════════════════════════════════════
     PART 4 — REFUNDS TAB
══════════════════════════════════════════ -->
<div class="tab-panel" id="tab-refunds">
  <div class="page-title">Refunds</div>
  <div class="page-sub">Approve incoming requests, or track ones you've sent</div>

  <div class="card">
    <div class="refund-section-title"><span>⏳</span> Pending Approval — Refund Requests for You</div>
    <div id="pendingRefundsContainer"><p style="color:var(--muted);font-size:0.875rem">Loading...</p></div>
  </div>

  <div class="card">
    <div class="refund-section-title"><span>📤</span> My Refund Requests</div>
    <div id="myRefundsContainer"><p style="color:var(--muted);font-size:0.875rem">Loading...</p></div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     PART 4 — REFUND REQUEST MODAL
══════════════════════════════════════════ -->
<div class="modal-overlay" id="refundModal">
  <div class="modal">
    <div class="icon">↩</div>
    <h3>Request Refund</h3>
    <p>The receiver must approve this request before money is returned to you.</p>
    <div class="refund-modal-info">
      <div class="refund-modal-row"><span class="key">Payment ID</span> <span class="mono" style="font-size:0.8rem;color:var(--accent2)" id="refundModalPayId">—</span></div>
      <div class="refund-modal-row"><span class="key">Amount</span>     <span style="font-weight:700;color:var(--yellow)" id="refundModalAmount">—</span></div>
      <div class="refund-modal-row"><span class="key">Requesting from</span> <span id="refundModalReceiver">—</span></div>
    </div>
    <div class="field" style="text-align:left">
      <label>Confirm with your UPI PIN</label>
      <input type="password" id="refundPinInput" placeholder="••••" maxlength="6"/>
    </div>
    <p id="refundError" class="error-msg"></p>
    <div class="modal-btn-row">
      <button class="btn-secondary" onclick="closeRefundModal()">Cancel</button>
      <button class="btn-primary"   onclick="submitRefundRequest()" id="refundSubmitBtn" style="width:auto;padding:10px 24px">Send Refund Request</button>
    </div>
  </div>
</div>

<!-- PART 5: Analytics tab + Toast -->

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
