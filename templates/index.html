<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PayFlow — Payment Gateway</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>
</head>
<body>

<!-- PART 1: Login page + Dashboard shell -->
<!-- PART 2: Send Money tab + Payment modal -->


<div class="tab-panel" id="tab-history">
  <div class="page-title">Transaction History</div>
  <div class="page-sub">All payments you have sent or received. Request a refund on eligible sent payments.</div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Payment ID</th><th>Type</th><th>Party</th>
            <th>Amount</th><th>Status</th><th>Time</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="7" style="text-align:center;color:var(--muted);padding:32px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     PART 3 — CHECK PAYMENT STATUS TAB
══════════════════════════════════════════ -->
<div class="tab-panel" id="tab-checker">
  <div class="page-title">Check Payment Status</div>
  <div class="page-sub">Look up any payment by its ID</div>
  <div class="checker-wrap">
    <div class="field">
      <label>Payment ID</label>
      <div class="input-row">
        <input type="text" id="checkPayId" placeholder="e.g. PAY3F8A1B2C3D"/>
        <button onclick="checkStatus()">Check Status</button>
      </div>
    </div>
    <div class="status-result" id="statusResult" style="display:none">
      <div class="status-card" id="statusCard"></div>
    </div>
  </div>
</div>


<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
